name: Generate Contribution Snake

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Generate Snake Animation SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff6b6b&color_dots=#161b22,#2d1919,#572222,#8a2d2d,#ff6b6b
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff6b6b&color_dots=#0d1117,#2d1919,#572222,#8a2d2d,#ff6b6b
            
      - name: Deploy Generated SVGs to Orphan Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: github-contribution-grid-snake
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
